<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Horax — ÓrbitaKidx</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><circle cx='24' cy='24' r='20' fill='%233aa0ff' stroke='%2315172a' stroke-width='3'/><circle cx='17' cy='17' r='6' fill='%2346c66e'/><circle cx='31' cy='29' r='7' fill='%2346c66e'/><circle cx='17' cy='32' r='4' fill='%2346c66e'/><ellipse cx='17' cy='15' rx='5' ry='3' fill='%23ffffff' opacity='0.5'/></svg>">
<meta name="theme-color" content="#8fc1ff">
<meta name="apple-mobile-web-app-title" content="Horax">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ====================== TOKENS ====================== */
:root{
  --sky1:#6fb7ff; --sky2:#bfe6ff;
  --grass:#5fb12b; --grass-d:#3f7d1c;
  --dirt:#7a4a25;
  --ink:#202338; --ink-soft:#4a4e6b;
  --panel:#ffffff; --panel-2:#f4f2ff;
  --line:#23263d;
  --gold:#ffcf3f; --gold-d:#e0a51e;
  --purple:#7b5cff; --purple-d:#553bc4;
  --green:#37c871; --green-d:#1f9c52;
  --red:#ff6b5e; --red-d:#d6463a;
  --orange:#ff9f43; --orange-d:#df7c1c;
  --teal:#22c6c6; --teal-d:#149a9a;
  --blue:#3d9bff; --blue-d:#2274d8;
  --pink:#ff6fae; --pink-d:#d6478a;
  --bronze:#cd874b; --silver:#cfd6e2;
  --pixel:'Fredoka', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --body:'Fredoka', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; font-family:var(--body); font-weight:500; color:var(--ink);
  background: linear-gradient(170deg, #8fc1ff 0%, #aec2ff 45%, #d6c9f6 100%);
  background-attachment:fixed;
  min-height:100%;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
/* fondo limpio: sin franja de hierba */
.app-wrap{position:relative; z-index:1; max-width:920px; margin:0 auto; padding:14px 14px 28px;}

/* ====================== SHARED BLOCKY LOOK ====================== */
.pixel{font-family:var(--pixel); letter-spacing:.2px; line-height:1.5;}
.btn,.logo h1,.stat b,.section-title,.card h3,.panel h2,.tile .tn,.pill .pl,.qmeta,.mult-q,.vsum,.answer-display,.key,.result-card .big,.medal h4,.modal h2{font-weight:700;}
.block{
  border:3px solid var(--line);
  box-shadow: inset 4px 4px 0 rgba(255,255,255,.35), inset -5px -5px 0 rgba(0,0,0,.18), 0 5px 0 rgba(0,0,0,.18);
  border-radius:10px;
}
.btn{
  font-family:var(--pixel); font-size:12px; color:#fff; cursor:pointer;
  border:3px solid var(--line); border-radius:10px; padding:14px 16px;
  background:var(--blue);
  box-shadow: inset 3px 3px 0 rgba(255,255,255,.4), inset -4px -4px 0 rgba(0,0,0,.22), 0 5px 0 rgba(0,0,0,.22);
  transition: transform .05s ease, box-shadow .05s ease, filter .1s;
  text-shadow: 2px 2px 0 rgba(0,0,0,.28);
  user-select:none;
}
.btn:hover{filter:brightness(1.06);}
.btn:active{transform:translateY(4px); box-shadow: inset 3px 3px 0 rgba(255,255,255,.4), inset -4px -4px 0 rgba(0,0,0,.22), 0 1px 0 rgba(0,0,0,.22);}
.btn.green{background:var(--green);} .btn.red{background:var(--red);}
.btn.gold{background:var(--gold); color:var(--ink); text-shadow:1px 1px 0 rgba(255,255,255,.4);}
.btn.purple{background:var(--purple);} .btn.orange{background:var(--orange);}
.btn.teal{background:var(--teal);} .btn.ghost{background:#fff; color:var(--ink); text-shadow:none;}
.btn.sm{font-size:10px; padding:10px 12px;}

/* ====================== HEADER ====================== */
.topbar{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:16px; flex-wrap:wrap;}
.logo{display:flex; align-items:center; gap:10px; cursor:pointer;}
.logo .cube{width:42px; height:42px;}
.logo h1{font-family:var(--pixel); font-size:20px; margin:0; color:#fff;
  text-shadow: 3px 3px 0 var(--ink), -1px -1px 0 var(--ink), 1px -1px 0 var(--ink), -1px 1px 0 var(--ink);}
.logo h1 b{color:var(--gold);}
.profile-chip{display:flex; align-items:center; gap:10px; background:#fff; padding:7px 12px 7px 8px; cursor:pointer;}
.profile-chip .av{width:38px; height:38px; border-radius:8px; border:2px solid var(--line); overflow:hidden; flex:none;}
.profile-chip .who{display:flex; flex-direction:column; line-height:1.1;}
.profile-chip .who .nm{font-weight:900; font-size:15px;}
.profile-chip .who .md{font-size:12px; color:var(--ink-soft); font-weight:700; display:flex; align-items:center; gap:4px;}

/* ====================== HOME ====================== */
.hero{background:#fff; padding:16px 18px 30px; margin-bottom:16px; position:relative; display:flex; align-items:center; justify-content:center; text-align:center; gap:14px; flex-wrap:wrap;}
.hero .big-av{width:74px; height:74px; border:3px solid var(--line); border-radius:12px; overflow:hidden; flex:none;}
.hero .htxt{flex:1; min-width:200px;}
.hero .htxt h2{margin:0 0 4px; font-size:22px; font-weight:900;}
.hero .htxt p{margin:0; color:var(--ink-soft); font-weight:700;}
.stat-row{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:10px;}
.today-hearts{position:absolute; right:14px; bottom:8px; display:flex; align-items:center; gap:3px;}
.today-hearts .th-lbl{font-weight:800; font-size:11px; color:var(--ink-soft); margin-right:4px;}
.today-hearts svg{width:22px; height:21px;}
.stat{background:var(--panel-2); border:2px solid var(--line); border-radius:9px; padding:6px 10px; font-weight:800; font-size:13px; display:flex; align-items:center; gap:6px;}
.stat b{font-family:var(--pixel); font-size:13px;}
.today-hearts{position:absolute; right:14px; bottom:8px; display:flex; align-items:center; gap:3px;}
.today-hearts .th-lbl{font-weight:800; font-size:11px; color:var(--ink-soft); margin-right:4px;}
.today-hearts svg{width:22px; height:21px;}

.section-title{font-family:var(--pixel); color:#fff; font-size:14px; margin:18px 4px 12px; text-align:center;
  text-shadow:2px 2px 0 var(--ink);}
.grid{display:grid; grid-template-columns:repeat(2,1fr); gap:14px;}
@media(min-width:640px){ .grid{grid-template-columns:repeat(3,1fr);} }
.card{background:#fff; cursor:pointer; padding:0; overflow:hidden; transition:transform .08s;}
.card:hover{transform:translateY(-3px);}
.card:active{transform:translateY(1px);}
.card .top{height:8px;}
.card .body{padding:16px 14px 18px; text-align:center;}
.card .ic{width:56px; height:56px; margin:2px auto 10px;}
.card h3{margin:0 0 4px; font-family:var(--pixel); font-size:12px;}
.card p{margin:0; font-size:13px; color:var(--ink-soft); font-weight:700;}
.card .mini-stars{margin-top:8px; font-size:14px; letter-spacing:2px; color:var(--gold-d);}

/* ====================== SELECTOR / PILLS ====================== */
.back-bar{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
.panel{background:#fff; padding:18px; margin-bottom:14px; text-align:center;}
.panel h2{margin:0 0 4px; font-family:var(--pixel); font-size:16px;}
.panel .sub{color:var(--ink-soft); font-weight:700; margin:0 0 14px;}
.tables-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:12px; justify-content:center;}
.tile{background:var(--panel-2); border:3px solid var(--line); border-radius:12px; cursor:pointer; padding:14px 8px; text-align:center;
  box-shadow: inset 3px 3px 0 rgba(255,255,255,.6), inset -4px -4px 0 rgba(0,0,0,.12), 0 4px 0 rgba(0,0,0,.14);
  transition:transform .07s;}
.tile:hover{transform:translateY(-2px);}
.tile:active{transform:translateY(2px);}
.tile .tn{font-family:var(--pixel); font-size:20px; color:var(--purple-d);}
.tile .tl{font-size:12px; font-weight:800; color:var(--ink-soft); margin-top:3px;}
.tile .st{margin-top:6px; color:var(--gold-d); letter-spacing:1px; font-size:13px;}
.tile.mixto{background:linear-gradient(135deg,#ffe9a8,#ffd34d);}
.tile.mixto .tn{color:#a9701a; font-size:14px;}

.pills{display:flex; gap:12px; flex-wrap:wrap;}
.pill{flex:1; min-width:150px; cursor:pointer; background:var(--panel-2); border:3px solid var(--line); border-radius:12px; padding:14px; text-align:center;
  box-shadow: inset 3px 3px 0 rgba(255,255,255,.6), inset -4px -4px 0 rgba(0,0,0,.12), 0 4px 0 rgba(0,0,0,.14); transition:transform .07s;}
.pill:hover{transform:translateY(-2px);} .pill:active{transform:translateY(2px);}
.pill .pl{font-family:var(--pixel); font-size:12px;}
.pill .pd{font-size:12px; font-weight:700; color:var(--ink-soft); margin-top:6px;}
.pill .st{margin-top:8px; color:var(--gold-d); letter-spacing:2px;}
.pill.facil .pl{color:var(--green-d);} .pill.medio .pl{color:var(--orange-d);} .pill.dificil .pl{color:var(--red-d);}

.choose-row{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:12px;}
.chip{cursor:pointer; background:var(--panel-2); border:2px solid var(--line); border-radius:9px; padding:8px 12px; font-weight:800; font-size:13px;}
.chip.on{background:var(--blue); color:#fff;}

/* ====================== QUIZ ====================== */
.quiz-head{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px;}
.qmeta{font-family:var(--pixel); font-size:11px; color:#fff; text-shadow:2px 2px 0 var(--ink);}
.streak{display:flex; align-items:center; gap:6px; background:#fff; border:2px solid var(--line); border-radius:9px; padding:5px 10px; font-weight:900; font-size:14px;}
.progress{height:18px; background:#fff; border:3px solid var(--line); border-radius:10px; overflow:hidden; margin-bottom:16px;}
.progress .bar{height:100%; width:0%; background:linear-gradient(90deg,var(--green),var(--teal)); transition:width .35s ease;}

.qcard{background:#fff; padding:22px 18px; text-align:center; position:relative; overflow:hidden;}
.qcard.flash-ok{animation:flashok .5s;}
.qcard.flash-no{animation:flashno .5s;}
@keyframes flashok{0%{background:#d7ffe6;}100%{background:#fff;}}
@keyframes flashno{0%,20%,40%{transform:translateX(-8px);}10%,30%{transform:translateX(8px);}50%{transform:translateX(0); background:#ffe2de;}100%{background:#fff;}}

.mult-q{font-family:var(--pixel); font-size:42px; color:var(--ink); margin:10px 0 6px;}
@media(min-width:520px){ .mult-q{font-size:56px;} }
.mult-q .x{color:var(--purple);}

/* vertical column sums/restas */
.vsum{display:inline-block; text-align:right; font-family:var(--pixel); font-size:34px; color:var(--ink); margin:6px 0; min-width:170px; position:relative;}
@media(min-width:520px){ .vsum{font-size:44px; min-width:210px;} }
.vsum .row{padding:2px 6px 2px 50px; position:relative; letter-spacing:6px;}
.vsum .op{position:absolute; left:8px; color:var(--orange-d);}
.vsum hr{border:none; border-top:5px solid var(--line); margin:8px 0 4px;}
.vsum .res{color:var(--blue-d); min-height:40px;}
.vsum .res .cursor{color:var(--ink); animation:blink 1s steps(1) infinite;}
@keyframes blink{50%{opacity:0;}}

.answer-box{margin:14px auto 6px; max-width:320px;}
.answer-display{font-family:var(--pixel); font-size:30px; background:var(--panel-2); border:3px solid var(--line); border-radius:10px; padding:12px; min-height:58px; letter-spacing:4px;}
.answer-display.empty{color:#b9b9cc;}

.feedback{min-height:26px; margin:10px 0 4px; font-weight:900; font-size:16px;}
.feedback.ok{color:var(--green-d);} .feedback.no{color:var(--red-d);}

/* keypad */
.keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:340px; margin:6px auto 2px;}
.key{font-family:var(--pixel); font-size:20px; padding:16px 0; cursor:pointer; background:#fff; color:var(--ink);
  border:3px solid var(--line); border-radius:12px;
  box-shadow: inset 3px 3px 0 rgba(255,255,255,.6), inset -4px -4px 0 rgba(0,0,0,.14), 0 4px 0 rgba(0,0,0,.16);
  transition:transform .05s; user-select:none;}
.key:active{transform:translateY(4px); box-shadow: inset 3px 3px 0 rgba(255,255,255,.6), inset -4px -4px 0 rgba(0,0,0,.14), 0 1px 0 rgba(0,0,0,.16);}
.key.del{background:var(--orange); color:#fff;}
.key.ok{background:var(--green); color:#fff; font-size:16px;}

/* ---- modo cuaderno (sumas con llevadas) ---- */
.cu-hint{min-height:22px; font-weight:700; color:var(--ink-soft); font-size:15px; margin-bottom:10px;}
.cu-hint-warn{color:var(--red-d);}
.cu-grid{display:grid; width:max-content; gap:4px 6px; align-items:end; margin:8px auto;}
.cu-d{height:42px; display:flex; align-items:center; justify-content:center; font-family:var(--pixel); font-weight:700; font-size:30px; color:var(--ink);}
.cu-op{height:42px; display:flex; align-items:center; justify-content:center; font-family:var(--pixel); font-weight:700; font-size:26px; color:var(--orange-d);}
.cu-carry{height:26px; display:flex; align-items:center; justify-content:center;}
.cu-line{grid-column:1 / -1; height:5px; background:var(--line); border-radius:3px; margin:4px 0;}
.cu-cell{display:flex; align-items:center; justify-content:center; font-family:var(--pixel); font-weight:700; border-radius:8px; cursor:pointer; transition:box-shadow .1s, background .1s;}
.cu-carrybox{width:24px; height:24px; font-size:15px; border:2px dashed var(--orange-d); color:var(--orange-d); background:#fff8ec;}
.cu-resbox{width:42px; height:46px; font-size:28px; border:3px solid var(--line); background:var(--panel-2); color:var(--ink);}
.cu-cell.active{box-shadow:0 0 0 4px rgba(61,155,255,.45); border-color:var(--blue);}
.cu-cell.ok{background:#d7ffe6; border-color:var(--green); color:var(--green-d);}
.cu-cell.bad{animation:flashno .42s; border-color:var(--red); color:var(--red-d);}
.cu-carrybox.active{border-color:var(--orange-d); box-shadow:0 0 0 4px rgba(255,159,67,.5);}
@keyframes cuPulse{0%,100%{box-shadow:0 0 0 3px rgba(255,159,67,.6); transform:scale(1);} 50%{box-shadow:0 0 0 7px rgba(255,159,67,.32); transform:scale(1.2);}}
.cu-hint.cu-hint-carry{display:inline-block; background:#fff1dc; border:2px solid var(--orange-d); border-radius:10px; padding:7px 12px; color:#9a5a00;}
.cu-struck{color:#9aa0b8; text-decoration:line-through; text-decoration-color:#ff5d6c; text-decoration-thickness:3px;}
.seg{display:inline-flex; border:3px solid var(--line); border-radius:12px; overflow:hidden; margin:2px 0 6px;}
.seg-btn{font-weight:800; font-size:13px; padding:8px 14px; cursor:pointer; background:#fff; color:var(--ink-soft);}
.seg-btn.on{background:var(--blue); color:#fff;}
.seg-btn+.seg-btn{border-left:3px solid var(--line);}
/* ---- modo estudio de tablas ---- */
.study-grid{display:grid; grid-template-columns:1fr; gap:8px; margin-top:6px;}
@media(min-width:480px){ .study-grid{grid-template-columns:1fr 1fr;} }
.study-row{background:var(--panel-2); border:2px solid var(--line); border-radius:10px; padding:9px 14px; font-family:var(--pixel); font-weight:700; font-size:18px; display:flex; justify-content:space-between; align-items:center;}
.study-row b{color:var(--purple-d);}
.study-q{display:inline-flex; align-items:center; justify-content:center; min-width:38px; height:30px; color:#fff; background:var(--blue); border:2px solid var(--line); border-radius:8px; cursor:pointer; box-shadow:inset 2px 2px 0 rgba(255,255,255,.3), inset -3px -3px 0 rgba(0,0,0,.18); transition:transform .06s;}
.study-q:active{transform:translateY(2px);}
.tip-box{background:#fff7df; border:2px solid var(--gold-d); border-radius:10px; padding:10px 12px; font-weight:700; color:#6b5210; margin:2px 0 12px; font-size:14px;}
.tip-box b{color:var(--orange-d);}
.review-box{background:#fff4f3; border:2px solid var(--red-d); border-radius:12px; padding:12px 14px; margin:16px auto 0; max-width:380px;}
.review-title{font-weight:800; color:var(--red-d); margin-bottom:8px;}
.review-list{display:flex; flex-direction:column; gap:6px;}
.review-item{font-family:var(--pixel); font-weight:700; font-size:15px; background:#fff; border:2px solid var(--line); border-radius:8px; padding:6px 8px;}

/* ====================== RESULTS ====================== */
.result-card{background:#fff; padding:26px 20px; text-align:center;}
.result-card .big{font-family:var(--pixel); font-size:38px; margin:6px 0;}
.result-card .stars-big{font-size:42px; letter-spacing:8px; color:var(--gold-d); margin:8px 0;}
.result-msg{font-weight:800; font-size:17px; margin:6px 0 16px; color:var(--ink-soft);}
.result-actions{display:flex; gap:12px; justify-content:center; flex-wrap:wrap;}

/* ====================== MEDALLAS ====================== */
.medals-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:14px;}
.medal{background:#fff; padding:14px 10px; text-align:center;}
.medal.locked{filter:grayscale(1) opacity(.55);}
.medal .msvg{width:64px; height:64px; margin:2px auto 8px;}
.medal h4{margin:0 0 3px; font-family:var(--pixel); font-size:10px;}
.medal p{margin:0; font-size:12px; font-weight:700; color:var(--ink-soft);}

/* ====================== MODAL / TOAST ====================== */
.modal-bg{position:fixed; inset:0; background:rgba(20,22,40,.6); display:flex; align-items:center; justify-content:center; padding:18px; z-index:50;}
.modal{background:#fff; max-width:440px; width:100%; padding:22px; max-height:90vh; overflow:auto;}
.modal h2{margin:0 0 6px; font-family:var(--pixel); font-size:16px;}
.modal p{margin:0 0 14px; font-weight:700; color:var(--ink-soft);}
.name-input{width:100%; font-family:var(--body); font-size:18px; font-weight:800; padding:12px; border:3px solid var(--line); border-radius:10px; margin-bottom:14px;}
.av-pick{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; max-height:46vh; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:2px;}
.pick-go{position:sticky; bottom:0; background:#fff; padding-top:12px; display:flex; justify-content:center;}
.pick-go .btn{width:100%; max-width:340px; text-align:center;}
.av-opt{border:3px solid var(--line); border-radius:12px; padding:6px; cursor:pointer; background:var(--panel-2);}
.av-opt.on{border-color:var(--blue); box-shadow:0 0 0 3px rgba(61,155,255,.4);}
.av-opt svg{width:100%; height:auto; display:block;}

.toast-wrap{position:fixed; left:0; right:0; bottom:18px; display:flex; flex-direction:column; align-items:center; gap:8px; z-index:60; pointer-events:none;}
.toast{background:var(--gold); color:var(--ink); border:3px solid var(--line); border-radius:12px; padding:10px 16px 10px 12px; display:flex; align-items:center; gap:10px;
  box-shadow:0 6px 0 rgba(0,0,0,.2); font-weight:900; animation:pop .4s, fade .4s 3.4s forwards; max-width:90%;}
.toast svg{width:34px; height:34px; flex:none;}
.toast small{display:block; font-weight:800; color:var(--ink-soft); font-size:11px;}
@keyframes pop{0%{transform:scale(.6) translateY(20px); opacity:0;}100%{transform:scale(1) translateY(0); opacity:1;}}
@keyframes fade{to{opacity:0; transform:translateY(10px);}}

.confetti{position:fixed; top:-10px; width:10px; height:14px; z-index:40; pointer-events:none;}
.hidden{display:none !important;}
.footer-note{text-align:center; color:rgba(32,35,58,.6); font-weight:700; font-size:12px; margin-top:18px;}
.topright{display:flex; align-items:center; gap:10px;}
.sound-btn{width:44px; height:44px; display:flex; align-items:center; justify-content:center; background:#fff; cursor:pointer; padding:0;}
.wintro{text-align:center; padding:6px 2px;}
.wglobe{width:120px; height:120px; margin:6px auto 12px; animation:wfloat 3s ease-in-out infinite;}
.wglobe.sm{width:72px; height:72px; margin:4px auto 8px;}
@keyframes wfloat{0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)}}
h2.wtitle{font-size:30px; margin:0;}
h2.wtitle b{color:var(--gold);}
.wsub{color:var(--ink-soft); font-weight:700; margin:2px 0 18px;}
@media (max-width:480px){
  .app-wrap{padding:10px 10px 22px;}
  .qcard{padding:16px 12px;}
  .quiz-head{margin-bottom:8px;}
  .progress{height:14px; margin-bottom:10px;}
  .mult-q{font-size:38px; margin:6px 0 4px;}
  .answer-display{font-size:26px; min-height:46px; padding:8px;}
  .keypad{gap:8px; max-width:300px; margin:4px auto 0;}
  .key{font-size:18px; padding:12px 0;}
  .key.ok{font-size:14px;}
  .vsum{font-size:30px;}
  .feedback{min-height:20px; margin:6px 0 2px; font-size:15px;}
  .topbar{margin-bottom:10px;}
  .hero{padding:12px 12px 26px; gap:10px;}
  .hero .big-av{width:58px; height:58px;}
  .hero .htxt{min-width:140px;}

function pad2(n){ return (n<10?'0':'')+n; }

var NUMW=['','una','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce'];
var MINW={5:'cinco',10:'diez',20:'veinte',25:'veinticinco'};
function artHour(h){ return h===1 ? 'la una' : 'las '+NUMW[h]; }
function nextH(h){ return h%12+1; }
function cap(t){ return t.charAt(0).toUpperCase()+t.slice(1); }
function timePhrase(h,m){
  if(m===0) return artHour(h)+' en punto';
  if(m===15) return artHour(h)+' y cuarto';
  if(m===30) return artHour(h)+' y media';
  if(m===45) return artHour(nextH(h))+' menos cuarto';
  if(m<30) return artHour(h)+' y '+MINW[m];
  return artHour(nextH(h))+' menos '+MINW[60-m];
}
function randTime(level){

  else m=pick([0,5,10,15,20,25,30,35,40,45,50,55]);
  return {h:h,m:m};

    shuffle(items);

  else if(mode==='leer'){ for(var i=0;i<n;i++) items.push(genLeer(level)); }
  else if(mode==='digital'){ for(var i=0;i<n;i++) items.push(genDigital(level)); }

function progBlock(title,mode){ var keys=["facil","medio","dificil"],labels=["Fácil","Medio","Difícil"]; var h='<div class="panel block"><h2>'+title+'</h2><div class="pills">'; for(var i=0;i<3;i++){ var st=DATA.stars[mode][keys[i]]||0; h+='<div class="pill" style="cursor:default"><div class="pl">'+labels[i]+'</div><div class="st">'+starStr(st)+'</div></div>'; } return h+'</div></div>'; }
function renderProgress(){ var s=DATA.stats, html=backBar("Mi progreso")+progBlock("Leer la hora","leer")+progBlock("Analógico y digital","digital")+progBlock("¿Cuánto falta?","falta")+progBlock("Partes del día","partes")
   +'<div class="panel block"><h2>Estadísticas</h2><div class="stat-row"><div class="stat">Respondidas <b>'+s.totalAnswered+'</b></div><div class="stat">Aciertos <b>'+s.totalCorrect+'</b></div><div class="stat">Mejor racha <b>'+s.bestStreak+'</b></div><div class="stat">Exámenes <b>'+s.exams.completed+'</b></div><div class="stat">Sesiones <b>'+(s.sessions||0)+'</b></div><div class="stat">Días <b>'+(s.days||0)+'</b></div></div><div style="margin-top:16px"><div class="btn red sm" onclick="confirmReset()">Reiniciar todo el progreso</div></div></div>';
  $("screen").innerHTML=html; window.scrollTo(0,0);
}
function confirmReset(){ showModal('<h2>¿Reiniciar todo?</h2><p>Se borrarán medallas, estrellas y estadísticas. No se puede deshacer.</p><div class="result-actions"><div class="btn red" onclick="doReset()">Borrar todo</div><div class="btn ghost" onclick="closeModal()">Cancelar</div></div>'); }
function doReset(){ var nm=DATA.name,av=DATA.avatar,pr=DATA.prefs; DATA=defaultData(); DATA.name=nm; DATA.avatar=av; DATA.onboarded=true; DATA.prefs=pr; saveData(); refreshChip(); closeModal(); goHome(); }

/* modal / perfil / onboarding */
var pickAvIdx=0;
function showModal(inner,noClose){ var bg=document.createElement('div'); bg.className='modal-bg'; bg.innerHTML='<div class="modal block">'+inner+'</div>'; if(!noClose){ bg.addEventListener('click',function(e){ if(e.target===bg) closeModal(); }); } $("modalHost").innerHTML=''; $("modalHost").appendChild(bg); }
function closeModal(){ $("modalHost").innerHTML=''; }
function pickAv(i){ pickAvIdx=i; sfx('tap'); var o=document.querySelectorAll('#avPick .av-opt'); for(var k=0;k<o.length;k++) o[k].classList.toggle('on', parseInt(o[k].getAttribute('data-i'),10)===i); }
function openProfile(){ pickAvIdx=DATA.avatar; var avs=''; for(var i=0;i<AVATARS.length;i++) avs+='<div class="av-opt'+(i===pickAvIdx?' on':'')+'" data-i="'+i+'" onclick="pickAv('+i+')">'+avatarSVG(i)+'</div>';
  showModal('<h2>Tu perfil</h2><p>Elige tu nombre y tu personaje.</p><input class="name-input" id="nameInput" maxlength="14" placeholder="Tu nombre" value="'+escapeHtml(DATA.name)+'"><div class="av-pick" id="avPick">'+avs+'</div><div class="result-actions"><div class="btn green" onclick="saveProfile()">Guardar</div><div class="btn ghost" onclick="closeModal()">Cancelar</div></div>'); }
function saveProfile(){ var inp=$("nameInput"); var n=inp?inp.value.trim():(WNAME||""); DATA.name=n||"Jugador"; DATA.avatar=pickAvIdx; DATA.onboarded=true; saveData(); refreshChip(); closeModal(); renderHome(); sfx('win'); }
var WNAME="";
function welcome(){ WNAME=""; wStep(0); }
function wStep(n){ if(n===0){ showModal('<div class="wintro"><div class="wglobe">'+bigGlobeSVG()+'</div><h2 class="wtitle">Hora<b>x</b></h2><p class="wsub">Aprende a leer el reloj · ÓrbitaKidx</p><div class="btn gold" onclick="sfx(\'start\');wStep(1)">¡EMPEZAR!</div></div>', true); }
  else if(n===1){ showModal('<div class="wintro"><div class="wglobe sm">'+bigGlobeSVG()+'</div><h2>¿Cómo te llamas?</h2><input class="name-input" id="nameInput" maxlength="14" placeholder="Tu nombre" value="'+escapeHtml(WNAME)+'"><div class="result-actions"><div class="btn green" onclick="wName()">Siguiente</div></div></div>', true); setTimeout(function(){ var i=$("nameInput"); if(i) i.focus(); },60); }
  else { pickAvIdx=0; var avs=''; for(var i=0;i<AVATARS.length;i++) avs+='<div class="av-opt'+(i===0?' on':'')+'" data-i="'+i+'" onclick="pickAv('+i+')">'+avatarSVG(i)+'</div>'; showModal('<h2>Elige tu personaje</h2><p>Será tu compañero de juego.</p><div class="av-pick" id="avPick">'+avs+'</div><div class="pick-go"><div class="btn gold" onclick="saveProfile()">¡A JUGAR!</div></div>', true); } }
function wName(){ var i=$("nameInput"); WNAME=(i&&i.value.trim())||"Jugador"; sfx('tap'); wStep(2); }
function toast(a){ sfx('medal'); var t=document.createElement('div'); t.className='toast'; t.innerHTML='<div style="width:34px;height:34px">'+medalSVG(a.tier,a.icon,false)+'</div><div>¡Medalla nueva!<small>'+a.name+'</small></div>'; $("toastHost").appendChild(t); setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); },4000); }
function confettiBurst(){ var col=["#ffcf3f","#37c871","#3d9bff","#ff6b5e","#7b5cff","#ff9f43"]; for(var i=0;i<60;i++){ (function(){ var c=document.createElement('div'); c.className='confetti'; c.style.left=Math.random()*100+'vw'; c.style.background=col[Math.floor(Math.random()*col.length)]; document.body.appendChild(c); var dur=1800+Math.random()*1400, drift=(Math.random()-0.5)*180; c.animate([{top:'-10px',transform:'translateX(0)',opacity:1},{top:'105vh',transform:'translateX('+drift+'px) rotate('+(720*Math.random())+'deg)',opacity:.9}],{duration:dur,easing:'cubic-bezier(.3,.6,.5,1)'}); setTimeout(function(){ if(c.parentNode) c.parentNode.removeChild(c); },dur); })(); } }

document.addEventListener('keydown',function(e){ if(!QUIZ||QUIZ.answered){ if(e.key==="Enter"){ var b=document.querySelector('.btn.red'); if(b) b.click(); } return; } if(/^[1-3]$/.test(e.key)){ answer(parseInt(e.key,10)-1); } });

if('scrollRestoration' in history){ try{ history.scrollRestoration='manual'; }catch(e){} }
refreshChip(); updateSoundBtn(); renderHome(); if(!DATA.onboarded) welcome();
window.scrollTo(0,0);
window.addEventListener('load',function(){ window.scrollTo(0,0); });
</script>
</body>
</html>
